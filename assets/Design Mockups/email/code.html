<body class="min-h-screen flex flex-col relative overflow-hidden bg-surface selection:bg-primary selection:text-on-primary">
<div class="fixed inset-0 ankara-overlay pointer-events-none"></div>
<div class="fixed top-[-10%] right-[-10%] w-[50%] h-[50%] bg-secondary/10 blur-[120px] rounded-full pointer-events-none"></div>
<div class="fixed bottom-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 blur-[100px] rounded-full pointer-events-none"></div>
<header class="w-full flex justify-center py-12 z-10">
<div class="flex items-center gap-3">
<div class="w-12 h-12 bg-secondary rounded-xl flex items-center justify-center shadow-lg shadow-secondary/20">

<main class="flex-grow flex items-center justify-center px-6 pb-20 z-10">
<div class="w-full max-w-md">
<div class="glass-panel p-8 md:p-10 rounded-[2rem] shadow-2xl relative">
<div class="absolute -top-6 -right-6 w-20 h-20 bg-primary/10 blur-xl rounded-full"></div>
<div class="mb-10 text-center">
<h2 class="font-headline text-3xl font-bold mb-3 text-on-surface">Join the Archive</h2>
<p class="text-on-surface-variant font-body leading-relaxed">
                        Secure your place in the royal arena. Prestige awaits.
                    </p>
</div>
<form class="space-y-6">
<div class="space-y-2">
<label class="block text-xs font-semibold uppercase tracking-widest text-secondary/80 ml-1">Full Name</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant group-focus-within:text-secondary transition-colors">person</span>
</div>
<input class="w-full bg-surface-container-highest border-transparent rounded-xl py-4 pl-12 pr-4 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-1 focus:ring-secondary/50 focus:border-secondary/50 transition-all outline-none" placeholder="Chidi Adebayo" type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="block text-xs font-semibold uppercase tracking-widest text-secondary/80 ml-1">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant group-focus-within:text-secondary transition-colors">mail</span>
</div>
<input class="w-full bg-surface-container-highest border-transparent rounded-xl py-4 pl-12 pr-4 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-1 focus:ring-secondary/50 focus:border-secondary/50 transition-all outline-none" placeholder="chidi@archive.ng" type="email"/>
</div>
</div>
<div class="space-y-2">
<label class="block text-xs font-semibold uppercase tracking-widest text-secondary/80 ml-1">Password</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant group-focus-within:text-secondary transition-colors">lock</span>
</div>
<input class="w-full bg-surface-container-highest border-transparent rounded-xl py-4 pl-12 pr-12 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-1 focus:ring-secondary/50 focus:border-secondary/50 transition-all outline-none" placeholder="••••••••••••" type="password"/>
<div class="absolute inset-y-0 right-0 pr-4 flex items-center">
<button class="text-on-surface-variant hover:text-on-surface" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
</div>
<div class="pt-4">
<button class="w-full bg-gradient-to-br from-secondary to-secondary-container text-on-secondary font-headline font-bold py-5 rounded-xl flex items-center justify-center gap-2 primary-glow active:scale-[0.98] transition-all" type="submit">

</button>

</form>
<div class="mt-10 flex flex-col items-center gap-4">

<div class="flex items-center gap-2 text-on-surface-variant/40 text-xs">
<span class="material-symbols-outlined text-sm">policy</span>
